<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Rocket Book" />
  <meta name="theme-color" content="#f8fafc" />

  <link rel="apple-touch-icon" href="rocket_book_logo.png?v=10" />
  <link rel="icon" type="image/png" sizes="192x192" href="rocket_book_logo.png?v=10" />
  <link rel="icon" type="image/png" sizes="512x512" href="rocket_book_logo.png?v=10" />
  <link rel="shortcut icon" href="rocket_book_logo.png?v=10" />

  <title>Rocket Book</title>

  <style>
    :root {
      --bg1: #fff7ed;
      --bg2: #eff6ff;
      --text: #172033;
      --muted: #5f6b85;
      --green1: #79cc69;
      --green2: #4aa84f;
      --yellow1: #f4d45c;
      --yellow2: #e9aa1f;
      --shadow: 0 18px 40px rgba(0,0,0,0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
      touch-action: pan-y;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: max(14px, env(safe-area-inset-top));
      padding-right: max(14px, env(safe-area-inset-right));
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      padding-left: max(14px, env(safe-area-inset-left));
      user-select: none;
      -webkit-user-select: none;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: contain;
      background:
        radial-gradient(circle at top left, rgba(251,146,60,0.22), transparent 24%),
        radial-gradient(circle at top right, rgba(59,130,246,0.20), transparent 24%),
        radial-gradient(circle at bottom left, rgba(236,72,153,0.18), transparent 22%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.18), transparent 22%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    .app,
    button,
    img,
    a {
      touch-action: manipulation;
    }

    .app {
      width: min(100%, 430px);
      min-height: min(86vh, 800px);
      min-height: min(86dvh, 800px);
      background: rgba(255,255,255,0.95);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 18px 18px 20px 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.85);
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg,
          rgba(239,68,68,0.06) 0%,
          rgba(251,146,60,0.06) 20%,
          rgba(250,204,21,0.06) 40%,
          rgba(34,197,94,0.06) 60%,
          rgba(59,130,246,0.06) 80%,
          rgba(139,92,246,0.06) 100%);
    }

    .screen {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
      padding: 8px 4px 0 4px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .progress-text {
      font-size: clamp(28px, 7vw, 46px);
      font-weight: 900;
      line-height: 1.02;
      color: #111827;
      letter-spacing: -0.6px;
    }

    .brand-logo {
      width: min(44vw, 145px);
      max-width: 145px;
      max-height: 145px;
      height: auto;
      margin: 0 0 16px 0;
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.10));
    }

    .small-note {
      font-size: 15px;
      line-height: 1.38;
      color: var(--muted);
      max-width: 320px;
      margin-bottom: 12px;
    }

    .micro-note {
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
      margin-top: 8px;
    }

    .credit-link {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }

    .credit-link:hover,
    .credit-link:focus {
      text-decoration: underline;
    }

    .segmented-actions {
      width: 260px;
      max-width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(148,163,184,0.18);
      margin-top: 14px;
      margin-bottom: 10px;
    }

    .segment-btn {
      border: 0;
      min-width: 0;
      border-radius: 0;
      padding: 15px 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.15s ease;
      box-shadow: none;
    }

    .segment-btn:active {
      transform: scale(0.98);
    }

    .segment-left {
      border-right: 1px solid rgba(255,255,255,0.35);
    }

    .fast-btn {
      background: linear-gradient(180deg, var(--green1) 0%, var(--green2) 100%);
      color: #ffffff;
    }

    .rainbow-btn {
      background: linear-gradient(180deg, var(--yellow1) 0%, var(--yellow2) 100%);
      color: #2b1a00;
    }

    @media (max-width: 390px) {
      .brand-logo {
        width: min(46vw, 130px);
        max-width: 130px;
        max-height: 130px;
      }

      .segmented-actions {
        width: 240px;
      }

      .segment-btn {
        font-size: 15px;
        padding: 14px 12px;
      }

      .progress-text {
        font-size: clamp(26px, 7vw, 40px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="progress-text">Rocket Book<br>Games</div>
    </div>

    <div class="screen">
      <img src="rocket_book_logo.png" alt="Rocket Book logo" class="brand-logo" />

      <div class="small-note">
        Tap a reading game to begin.
      </div>

      <div class="segmented-actions">
        <button class="segment-btn fast-btn segment-left" onclick="window.location.href='fast.html'" type="button">
          Fast &amp; Fluent
        </button>
        <button class="segment-btn rainbow-btn" onclick="window.location.href='rainbow.html'" type="button">
          Rainbow Reading
        </button>
      </div>

      <div class="micro-note">Created for Ms. Canby’s friends</div>
      <div class="micro-note">
        Designed by
        <a
          class="credit-link"
          href="https://www.instagram.com/silvateaches/"
          target="_blank"
          rel="noopener noreferrer"
        >CreativeSilva</a>
      </div>
    </div>
  </div>
</body>
</html>
