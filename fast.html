<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fast & Fluent" />
  <meta name="theme-color" content="#f8fafc" />

  <link rel="apple-touch-icon" href="fast_and_fluent_logo.png?v=1" />
  <link rel="icon" type="image/png" sizes="192x192" href="fast_and_fluent_logo.png?v=1" />
  <link rel="icon" type="image/png" sizes="512x512" href="fast_and_fluent_logo.png?v=1" />
  <link rel="shortcut icon" href="fast_and_fluent_logo.png?v=1" />

  <title>Fast & Fluent</title>

  <style>
    :root {
      --bg1: #fff7ed;
      --bg2: #eff6ff;
      --text: #172033;
      --muted: #5f6b85;
      --green: #16a34a;
      --hard1: #ff5a1f;
      --hard2: #e11d48;
      --hard3: #b91c1c;
      --shadow: 0 18px 40px rgba(0,0,0,0.12);
      --soft-shadow: 0 12px 28px rgba(0,0,0,0.16);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
      touch-action: pan-y;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: max(14px, env(safe-area-inset-top));
      padding-right: max(14px, env(safe-area-inset-right));
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      padding-left: max(14px, env(safe-area-inset-left));
      user-select: none;
      -webkit-user-select: none;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: contain;
      background:
        radial-gradient(circle at top left, rgba(251,146,60,0.22), transparent 24%),
        radial-gradient(circle at top right, rgba(59,130,246,0.20), transparent 24%),
        radial-gradient(circle at bottom left, rgba(236,72,153,0.18), transparent 22%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.18), transparent 22%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    .app,
    button,
    img {
      touch-action: manipulation;
    }

    .app {
      width: min(100%, 430px);
      min-height: min(86vh, 800px);
      min-height: min(86dvh, 800px);
      background: rgba(255,255,255,0.95);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 18px 18px 20px 18px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.85);
      transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg,
          rgba(239,68,68,0.06) 0%,
          rgba(251,146,60,0.06) 20%,
          rgba(250,204,21,0.06) 40%,
          rgba(34,197,94,0.06) 60%,
          rgba(59,130,246,0.06) 80%,
          rgba(139,92,246,0.06) 100%);
      transition: opacity 0.35s ease;
    }

    .app.normal-play {
      background:
        radial-gradient(circle at 15% 20%, rgba(255,172,92,0.32), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(114,184,255,0.26), transparent 30%),
        radial-gradient(circle at 18% 82%, rgba(255,145,186,0.22), transparent 30%),
        radial-gradient(circle at 82% 84%, rgba(149,102,255,0.18), transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.72), rgba(255,255,255,0.90) 58%, rgba(245,247,252,0.96) 100%);
      border-color: rgba(255,255,255,0.92);
      box-shadow: 0 22px 44px rgba(79,70,229,0.08);
    }

    .app.normal-play::before {
      opacity: 0;
    }

    .app.normal-play::after {
      content: "";
      position: absolute;
      inset: -30%;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 28%, rgba(255,139,61,0.22), transparent 18%),
        radial-gradient(circle at 78% 24%, rgba(90,174,255,0.22), transparent 18%),
        radial-gradient(circle at 30% 75%, rgba(255,122,175,0.16), transparent 18%),
        radial-gradient(circle at 70% 76%, rgba(133,92,248,0.15), transparent 18%),
        radial-gradient(circle at 52% 52%, rgba(255,255,255,0.32), transparent 28%);
      filter: blur(26px);
      animation: auroraFloat 16s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes auroraFloat {
      0% {
        transform: translate3d(-2%, 0%, 0) scale(1);
      }
      50% {
        transform: translate3d(2%, -1.5%, 0) scale(1.04);
      }
      100% {
        transform: translate3d(-1%, 2%, 0) scale(1.02);
      }
    }

    .app.hard-mode {
      background: linear-gradient(180deg, #fff1f2 0%, #ffe4e6 50%, #fecdd3 100%);
      border-color: rgba(225,29,72,0.18);
      box-shadow: 0 20px 42px rgba(225,29,72,0.18);
    }

    .app.hard-mode::before {
      background:
        linear-gradient(180deg,
          rgba(255,90,31,0.10) 0%,
          rgba(225,29,72,0.10) 55%,
          rgba(185,28,28,0.10) 100%);
      opacity: 1;
    }

    .app.hard-mode::after {
      display: none;
    }

    .screen {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
      padding: 8px 4px 0 4px;
      position: relative;
      z-index: 1;
    }

    .screen.active {
      display: flex;
    }

    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
      text-align: center;
      min-height: 82px;
    }

    .progress-text {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.1;
      color: #111827;
      transition: color 0.25s ease;
    }

    .timer-text {
      font-size: 44px;
      font-weight: 900;
      line-height: 1;
      color: #111827;
      letter-spacing: -1px;
      transition: color 0.25s ease;
    }

    .app.hard-mode .progress-text,
    .app.hard-mode .timer-text {
      color: #8a1024;
    }

    .timer-text.hidden {
      visibility: hidden;
      height: 0;
      overflow: hidden;
    }

    .brand-logo {
      width: min(44vw, 145px);
      max-width: 145px;
      max-height: 145px;
      height: auto;
      margin: 0 0 12px 0;
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.10));
    }

    .title {
      font-size: clamp(34px, 8vw, 52px);
      font-weight: 900;
      line-height: 1.03;
      margin-bottom: 8px;
      letter-spacing: -0.6px;
      color: var(--text);
    }

    .subtitle {
      font-size: clamp(19px, 4.8vw, 25px);
      line-height: 1.2;
      color: #374151;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .small-note {
      font-size: 15px;
      line-height: 1.38;
      color: var(--muted);
      max-width: 320px;
      margin-bottom: 12px;
    }

    .menu-buttons,
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 15px 18px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      min-width: 120px;
      transition: transform 0.08s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .primary-btn {
      background: linear-gradient(180deg, #79cc69 0%, #4aa84f 100%);
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(74,168,79,0.22);
    }

    .shuffle-hard-btn {
      background: linear-gradient(180deg, var(--hard1) 0%, var(--hard2) 55%, var(--hard3) 100%);
      color: #ffffff;
      box-shadow: 0 10px 22px rgba(225,29,72,0.28);
    }

    .neutral-btn {
      background: linear-gradient(180deg, #dbe2ea 0%, #c4ccd8 100%);
      color: #1f2937;
    }

    .segmented-actions {
      width: 260px;
      max-width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(148,163,184,0.18);
      margin-top: 14px;
      margin-bottom: 10px;
    }

    .segment-btn {
      border: 0;
      min-width: 0;
      border-radius: 0;
      padding: 15px 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.15s ease;
      box-shadow: none;
    }

    .segment-btn:active {
      transform: scale(0.98);
    }

    .segment-left {
      border-right: 1px solid rgba(255,255,255,0.35);
    }

    .sentence-wrap {
      width: 100%;
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 10px;
    }

    .sentence {
      font-size: clamp(30px, 7.6vw, 52px);
      font-weight: 900;
      line-height: 1.18;
      max-width: 100%;
      margin: 0 auto;
      color: var(--text);
      position: relative;
      z-index: 2;
    }

    .sentence u {
      text-decoration-thickness: 2px;
      text-underline-offset: 5px;
    }

    .mode-label {
      margin-top: 4px;
      font-size: 16px;
      font-weight: 800;
      color: #b91c1c;
      min-height: 20px;
    }

    .app.hard-mode .mode-label {
      color: #9f1239;
    }

    .single-home-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }

    .single-home-btn {
      width: 180px;
      max-width: 100%;
      min-width: 0;
    }

    .result-title {
      font-size: clamp(30px, 8vw, 50px);
      font-weight: 900;
      margin-bottom: 8px;
      line-height: 1.04;
      color: var(--text);
    }

    .result-time {
      font-size: clamp(26px, 7vw, 42px);
      font-weight: 900;
      margin-bottom: 8px;
      color: var(--green);
      line-height: 1.08;
    }

    .result-text {
      font-size: 17px;
      line-height: 1.32;
      max-width: 310px;
      margin: 0 auto 10px auto;
      color: #243047;
    }

    .celebration-img {
      width: min(46vw, 170px);
      max-height: 170px;
      object-fit: cover;
      height: auto;
      border-radius: 22px;
      margin-top: 2px;
      box-shadow: 0 12px 28px rgba(0,0,0,.16);
      background: transparent;
      padding: 0;
      border: 0;
      display: block;
    }

    .compact-buttons {
      margin-top: 12px;
    }

    @media (max-width: 390px) {
      .sentence-wrap {
        min-height: 220px;
      }

      .timer-text {
        font-size: 38px;
      }

      .progress-text {
        font-size: 18px;
      }

      .brand-logo {
        width: min(46vw, 130px);
        max-width: 130px;
        max-height: 130px;
      }

      .result-text {
        font-size: 16px;
      }

      .celebration-img {
        width: min(50vw, 160px);
        max-height: 160px;
      }

      .segmented-actions {
        width: 240px;
      }

      .segment-btn {
        font-size: 15px;
        padding: 14px 12px;
      }

      .single-home-btn {
        width: 168px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar">
      <div class="progress-text" id="progressText"></div>
      <div class="timer-text hidden" id="timerText">00:00.0</div>
    </div>

    <div class="screen active" id="fastHomeScreen">
      <img src="fast_and_fluent_logo.png" alt="Fast and Fluent logo" class="brand-logo" />
      <div class="title">Fast &amp; Fluent</div>
      <div class="subtitle" id="fastHomeTitle">Wonders Unit 5 Week 1</div>
      <div class="small-note">
        Read each sentence out loud. Tap Start to go in order, or tap Shuffle for Ultra Super Duper Hard Mode.
      </div>

      <div class="segmented-actions">
        <button class="shuffle-hard-btn segment-btn segment-left" id="fastShuffleBtn" type="button">Shuffle</button>
        <button class="primary-btn segment-btn" id="fastStartBtn" type="button">Start</button>
      </div>

      <div class="single-home-wrap">
        <button class="neutral-btn single-home-btn" id="fastBackBtn" type="button">Home</button>
      </div>
    </div>

    <div class="screen" id="fastGameScreen">
      <div class="sentence-wrap">
        <div class="sentence" id="sentenceText"></div>
      </div>
      <div class="mode-label" id="fastModeLabel"></div>

      <div class="segmented-actions">
        <button class="neutral-btn segment-btn segment-left" id="fastResetBtn" type="button">Reset</button>
        <button class="primary-btn segment-btn" id="fastDoneBtn" type="button">Done</button>
      </div>
    </div>

    <div class="screen" id="finishScreen">
      <div class="result-title" id="finishTitle">Great Job, Reader!</div>
      <div class="result-time" id="finishTime">Final Time: 00:00.0</div>
      <div class="result-text" id="finishText">You finished your practice.</div>
      <img id="celebrationImg" class="celebration-img" src="giphy.gif" alt="Celebration image" />
      <div class="buttons compact-buttons" id="finishButtons"></div>
    </div>
  </div>

  <audio id="celebrationSound" preload="auto">
    <source src="celebration_sound.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const fastTitle = "Wonders Unit 5 Week 1";

    const fastSentences = [
      'Her <u>cart</u> is full of food.',
      'The <u>barn</u> is old and red.',
      'It is fun to make <u>art</u>.',
      'He broke his <u>arm</u>.',
      'Mom made a rug with <u>yarn</u>.',
      'I will not <u>harm</u> you.',
      'Are you so very <u>happy</u>?',
      'Where did you put the <u>key</u>?',
      'I have <u>four</u> cups.',
      '<u>None</u> of us are ready to go.'
    ];

    const maxCelebrationNumber = 40;
    const celebrationImages = ["giphy.gif"];
    for (let i = 1; i <= maxCelebrationNumber; i++) {
      celebrationImages.push(`giphy-${i}.gif`);
    }

    const app = document.getElementById("app");
    const progressText = document.getElementById("progressText");
    const timerText = document.getElementById("timerText");
    const fastHomeTitle = document.getElementById("fastHomeTitle");
    const sentenceText = document.getElementById("sentenceText");
    const fastModeLabel = document.getElementById("fastModeLabel");
    const finishTitle = document.getElementById("finishTitle");
    const finishTime = document.getElementById("finishTime");
    const finishText = document.getElementById("finishText");
    const celebrationImg = document.getElementById("celebrationImg");
    const finishButtons = document.getElementById("finishButtons");
    const celebrationSound = document.getElementById("celebrationSound");

    const screens = {
      home: document.getElementById("fastHomeScreen"),
      game: document.getElementById("fastGameScreen"),
      finish: document.getElementById("finishScreen")
    };

    fastHomeTitle.textContent = fastTitle;

    let currentMode = "home";
    let fastDeck = [];
    let fastIndex = 0;
    let fastHardMode = false;
    let fastTimerInterval = null;
    let fastStartTime = null;
    let fastElapsedMs = 0;

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
      }
      return arr;
    }

    function getRandomCelebrationImage() {
      const randomIndex = Math.floor(Math.random() * celebrationImages.length);
      return celebrationImages[randomIndex];
    }

    function formatTime(ms) {
      const totalTenths = Math.floor(ms / 100);
      const minutes = Math.floor(totalTenths / 600);
      const seconds = Math.floor((totalTenths % 600) / 10);
      const tenths = totalTenths % 10;
      const mm = String(minutes).padStart(2, "0");
      const ss = String(seconds).padStart(2, "0");
      return `${mm}:${ss}.${tenths}`;
    }

    function playCelebrationSound() {
      if (!celebrationSound) return;
      celebrationSound.currentTime = 0;
      celebrationSound.play().catch(() => {});
    }

    function stopCelebrationSound() {
      if (!celebrationSound) return;
      celebrationSound.pause();
      celebrationSound.currentTime = 0;
    }

    function setHardMode(isHard) {
      app.classList.remove("hard-mode", "normal-play");
      if (isHard) {
        app.classList.add("hard-mode");
      } else if (currentMode === "game") {
        app.classList.add("normal-play");
      }
    }

    function showScreen(screenKey) {
      Object.values(screens).forEach(screen => screen.classList.remove("active"));
      screens[screenKey].classList.add("active");
      currentMode = screenKey;
      updateHeader();
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    function updateHeader() {
      if (currentMode === "home") {
        progressText.textContent = "";
        timerText.classList.add("hidden");
        app.classList.remove("hard-mode", "normal-play");
      } else if (currentMode === "game") {
        progressText.textContent = `Sentence ${fastIndex + 1} of ${fastDeck.length}`;
        timerText.classList.remove("hidden");
        setHardMode(fastHardMode);
      } else {
        progressText.textContent = "";
        timerText.classList.add("hidden");
        app.classList.remove("hard-mode", "normal-play");
      }
    }

    function updateFastTimer() {
      if (!fastStartTime) return;
      fastElapsedMs = Date.now() - fastStartTime;
      timerText.textContent = formatTime(fastElapsedMs);
    }

    function startFastTimer() {
      fastStartTime = Date.now();
      fastElapsedMs = 0;
      timerText.textContent = "00:00.0";
      clearInterval(fastTimerInterval);
      fastTimerInterval = setInterval(updateFastTimer, 100);
    }

    function stopFastTimer() {
      clearInterval(fastTimerInterval);
      updateFastTimer();
    }

    function buildFastSequentialDeck() {
      fastDeck = [...fastSentences];
      fastIndex = 0;
      fastHardMode = false;
    }

    function buildFastShuffledDeck() {
      fastDeck = shuffleArray([...fastSentences]);
      fastIndex = 0;
      fastHardMode = true;
    }

    function updateFastModeLabel() {
      fastModeLabel.textContent = fastHardMode ? "Ultra Super Duper Hard Mode" : "";
    }

    function showFastSentence() {
      sentenceText.innerHTML = fastDeck[fastIndex];
      updateFastModeLabel();
      updateHeader();
    }

    function launchFastGame(shuffleFirst = false) {
      stopCelebrationSound();
      if (shuffleFirst) {
        buildFastShuffledDeck();
      } else {
        buildFastSequentialDeck();
      }
      showScreen("game");
      showFastSentence();
      startFastTimer();
    }

    function setFinishButtons(buttons) {
      finishButtons.innerHTML = "";
      buttons.forEach(btn => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = btn.label;
        button.className = btn.className;
        button.addEventListener("click", btn.onClick);
        finishButtons.appendChild(button);
      });
    }

    function advanceFastSentence() {
      fastIndex++;
      if (fastIndex >= fastDeck.length) {
        stopFastTimer();
        finishTitle.textContent = "Great Job, Reader!";
        finishTime.textContent = `Final Time: ${formatTime(fastElapsedMs)}`;
        finishTime.style.display = "block";
        finishText.textContent = "Write down your time, then read again and try to beat it.";
        celebrationImg.src = getRandomCelebrationImage();
        setFinishButtons([
          { label: "Read Again", className: "primary-btn", onClick: () => resetFastGame() },
          { label: "Home", className: "neutral-btn", onClick: () => window.location.href = "index.html" }
        ]);
        playCelebrationSound();
        showScreen("finish");
        return;
      }
      showFastSentence();
    }

    function resetFastGame() {
      stopCelebrationSound();
      clearInterval(fastTimerInterval);
      fastTimerInterval = null;
      fastStartTime = null;
      fastElapsedMs = 0;
      timerText.textContent = "00:00.0";
      fastDeck = [];
      fastIndex = 0;
      fastHardMode = false;
      app.classList.remove("hard-mode", "normal-play");
      showScreen("home");
    }

    document.getElementById("fastStartBtn").addEventListener("click", () => launchFastGame(false));
    document.getElementById("fastShuffleBtn").addEventListener("click", () => launchFastGame(true));
    document.getElementById("fastBackBtn").addEventListener("click", () => window.location.href = "index.html");
    document.getElementById("fastDoneBtn").addEventListener("click", advanceFastSentence);
    document.getElementById("fastResetBtn").addEventListener("click", resetFastGame);

    celebrationImg.src = getRandomCelebrationImage();
    updateHeader();
  </script>
</body>
</html>
