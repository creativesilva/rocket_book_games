<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Rainbow Reader</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#fff7ed,#eff6ff);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.app{
width:430px;
max-width:100%;
border-radius:30px;
background:white;
padding:20px;
box-shadow:0 20px 40px rgba(0,0,0,.12);
text-align:center;
}

.screen{
display:none;
flex-direction:column;
align-items:center;
}

.screen.active{
display:flex;
}

.logo{
width:140px;
margin-bottom:10px;
}

.title{
font-size:44px;
font-weight:900;
}

.subtitle{
font-size:22px;
color:#374151;
margin-bottom:10px;
}

.note{
font-size:15px;
color:#5f6b85;
margin-bottom:10px;
max-width:300px;
}

select{
width:260px;
padding:15px;
font-size:18px;
font-weight:800;
border-radius:22px;
border:0;
background:#f3f4f6;
margin-bottom:10px;
}

.segment{
width:260px;
display:grid;
grid-template-columns:1fr 1fr;
border-radius:22px;
overflow:hidden;
margin-top:12px;
}

button{
border:0;
padding:14px;
font-size:16px;
font-weight:800;
cursor:pointer;
}

.green{
background:linear-gradient(#7fd97d,#4fbb61);
color:white;
}

.yellow{
background:linear-gradient(#f4d45c,#e9aa1f);
}

.red{
background:linear-gradient(#f47a7a,#e54c4c);
color:white;
}

.gray{
background:#d1d5db;
}

.word{
font-size:70px;
font-weight:900;
margin:20px 0;
}

.stats{
font-weight:900;
margin-bottom:10px;
}

.reset{
margin-top:8px;
}

</style>
</head>

<body>

<div class="app">

<!-- HOME -->

<div class="screen active" id="home">

<img src="rainbow_reader_logo.png" class="logo">

<div class="title">Rainbow Reader</div>
<div class="subtitle">Choose a color list</div>
<div class="note">Tap the button below to select a color list.</div>

<select id="colorSelect">
<option>Red</option>
<option>Orange</option>
<option>Yellow</option>
<option>Green</option>
<option>Blue</option>
<option>Purple</option>
<option>Brown</option>
<option>Pink</option>
<option>Gray</option>
<option>Your Choice</option>
</select>

<div class="segment">
<button class="gray" id="homeBtn">Home</button>
<button class="green" id="continueBtn">Continue</button>
</div>

</div>


<!-- MODE -->

<div class="screen" id="mode">

<img src="rainbow_reader_logo.png" class="logo">

<div class="title">Rainbow Reader</div>
<div class="subtitle" id="modeTitle"></div>

<div class="note">Practice your words in order, or tap Shuffle for a mixed-up challenge.</div>

<div class="segment">
<button class="red" id="shuffleBtn">Shuffle</button>
<button class="green" id="startBtn">Start</button>
</div>

<button class="gray" id="modeHome">Home</button>

</div>


<!-- GAME -->

<div class="screen" id="game">

<div class="word" id="word"></div>

<div class="stats">
<span id="progress"></span>
<span style="color:red"> Missed <span id="missed">0</span></span>
<span style="color:green"> Correct <span id="correct">0</span></span>
</div>

<div class="segment">
<button class="red" id="missBtn">Missed</button>
<button class="green" id="correctBtn">Correct</button>
</div>

<button class="gray reset" id="resetBtn">Reset</button>

</div>


<!-- FINISH -->

<div class="screen" id="finish">

<h1 id="finishTitle"></h1>

<img id="celebrationImg" width="160">

<div class="segment">
<button class="yellow" id="anotherBtn">Another List</button>
<button class="green" id="againBtn">Read Again</button>
</div>

<button class="gray" id="finishHome">Home</button>

</div>

</div>


<audio id="rainbowMusic" src="rainbow_music.mp3" loop></audio>
<audio id="celebrationSound" src="celebration_sound.mp3"></audio>


<script>

const lists={
Red:["I","can","the","we","see","a","like","to","and","go"],
Orange:["for","have","of","they","said","want","here","me","this","what"],
Yellow:["school","down","out","very","be","pull","move","two","again","new"],
Green:["by","many","place","walk","away","now","some","today","why","way"],
Blue:["how","old","people","after","buy","done","every","soon","work","animal"],
Purple:["start","warm","caught","flew","know","laugh","listen","were","found","hard"],
Brown:["through","began","guess","learn","right","sure","color","early","instead","nothing"],
Pink:["brother","father","mother","friend","picture","been","month","children","their","year"],
Gray:["word","which","better","sister","write","number","year","thing","good","sound"],
"Your Choice":["follow","change","animal","might","paper","earth","sentence","different","America","between"]
}

let deck=[]
let index=0
let correct=0
let missed=0
let missedQueue=[]

const screens={
home:document.getElementById("home"),
mode:document.getElementById("mode"),
game:document.getElementById("game"),
finish:document.getElementById("finish")
}

const music=document.getElementById("rainbowMusic")
const celebration=document.getElementById("celebrationSound")

function show(s){
Object.values(screens).forEach(x=>x.classList.remove("active"))
screens[s].classList.add("active")
}

function startGame(shuffle=false){

music.currentTime=0
music.play()

let color=document.getElementById("colorSelect").value
deck=[...lists[color]]

if(shuffle){
deck.sort(()=>Math.random()-0.5)
}

index=0
correct=0
missed=0
missedQueue=[]

show("game")
nextWord()
}

function nextWord(){

if(index>=deck.length){

if(missedQueue.length>0){
deck=[...missedQueue]
missedQueue=[]
index=0
}else{
finish()
return
}

}

document.getElementById("word").textContent=deck[index]
document.getElementById("progress").textContent=index+" of "+deck.length
document.getElementById("correct").textContent=correct
document.getElementById("missed").textContent=missed

}

function markCorrect(){
correct++
index++
nextWord()
}

function markMiss(){
missed++
missedQueue.push(deck[index])
index++
nextWord()
}

function finish(){

music.pause()

celebration.currentTime=0
celebration.play()

document.getElementById("finishTitle").textContent="List Complete!"

show("finish")

}

document.getElementById("continueBtn").onclick=()=>{
let color=document.getElementById("colorSelect").value
document.getElementById("modeTitle").textContent=color+" List"
show("mode")
}

document.getElementById("shuffleBtn").onclick=()=>startGame(true)
document.getElementById("startBtn").onclick=()=>startGame(false)

document.getElementById("correctBtn").onclick=markCorrect
document.getElementById("missBtn").onclick=markMiss

document.getElementById("resetBtn").onclick=()=>{
music.pause()
show("mode")
}

document.getElementById("modeHome").onclick=()=>show("home")
document.getElementById("homeBtn").onclick=()=>show("home")
document.getElementById("finishHome").onclick=()=>show("home")
document.getElementById("anotherBtn").onclick=()=>show("home")
document.getElementById("againBtn").onclick=()=>show("mode")

</script>

</body>
</html>
