<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Rainbow Reader">
  <meta name="theme-color" content="#f8fafc">

  <link rel="apple-touch-icon" href="rainbow_reader_logo.png?v=3">
  <link rel="icon" type="image/png" sizes="192x192" href="rainbow_reader_logo.png?v=3">
  <link rel="icon" type="image/png" sizes="512x512" href="rainbow_reader_logo.png?v=3">
  <link rel="shortcut icon" href="rainbow_reader_logo.png?v=3">

  <title>Rainbow Reader</title>

  <style>
    :root {
      --bg1: #fff7ed;
      --bg2: #eff6ff;
      --text: #172033;
      --muted: #5f6b85;
      --green: #16a34a;
      --yellow: #f59e0b;
      --orange: #fb923c;
      --pink: #ec4899;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --red: #ef4444;
      --hard1: #ff5a1f;
      --hard2: #e11d48;
      --hard3: #b91c1c;
      --shadow: 0 18px 40px rgba(0,0,0,0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
      touch-action: pan-y;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: max(14px, env(safe-area-inset-top));
      padding-right: max(14px, env(safe-area-inset-right));
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      padding-left: max(14px, env(safe-area-inset-left));
      user-select: none;
      -webkit-user-select: none;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: contain;
      background:
        radial-gradient(circle at top left, rgba(251,146,60,0.22), transparent 24%),
        radial-gradient(circle at top right, rgba(59,130,246,0.20), transparent 24%),
        radial-gradient(circle at bottom left, rgba(236,72,153,0.18), transparent 22%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.18), transparent 22%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    .app,
    button,
    img,
    select {
      touch-action: manipulation;
    }

    .app {
      width: min(100%, 430px);
      min-height: min(86vh, 800px);
      min-height: min(86dvh, 800px);
      background: rgba(255,255,255,0.95);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 18px 18px 20px 18px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.85);
      transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg,
          rgba(239,68,68,0.06) 0%,
          rgba(251,146,60,0.06) 20%,
          rgba(250,204,21,0.06) 40%,
          rgba(34,197,94,0.06) 60%,
          rgba(59,130,246,0.06) 80%,
          rgba(139,92,246,0.06) 100%);
      transition: opacity 0.25s ease;
    }

    .app.hard-mode {
      background: linear-gradient(180deg, #fff1f2 0%, #ffe4e6 50%, #fecdd3 100%);
      border-color: rgba(225,29,72,0.18);
      box-shadow: 0 20px 42px rgba(225,29,72,0.18);
    }

    .app.hard-mode::before {
      background:
        linear-gradient(180deg,
          rgba(255,90,31,0.10) 0%,
          rgba(225,29,72,0.10) 55%,
          rgba(185,28,28,0.10) 100%);
    }

    .screen {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
      padding: 8px 4px 0 4px;
      position: relative;
      z-index: 1;
    }

    .screen.active {
      display: flex;
    }

    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
      text-align: center;
      min-height: 48px;
    }

    .brand-logo {
      width: min(44vw, 145px);
      max-width: 145px;
      max-height: 145px;
      height: auto;
      margin: 0 0 12px 0;
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.10));
    }

    .title {
      font-size: clamp(34px, 8vw, 52px);
      font-weight: 900;
      line-height: 1.03;
      margin-bottom: 8px;
      letter-spacing: -0.6px;
      color: var(--text);
    }

    .subtitle {
      font-size: clamp(19px, 4.8vw, 25px);
      line-height: 1.2;
      color: #374151;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .small-note {
      font-size: 15px;
      line-height: 1.38;
      color: var(--muted);
      max-width: 320px;
      margin-bottom: 12px;
    }

    .menu-buttons,
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 15px 18px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      min-width: 120px;
      transition: transform 0.08s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .primary-btn {
      background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(34,197,94,0.22);
    }

    .secondary-btn {
      background: linear-gradient(180deg, #fcd34d 0%, #f59e0b 100%);
      color: #2b1a00;
      box-shadow: 0 10px 20px rgba(245,158,11,0.20);
    }

    .shuffle-hard-btn {
      background: linear-gradient(180deg, var(--hard1) 0%, var(--hard2) 55%, var(--hard3) 100%);
      color: #ffffff;
      box-shadow: 0 10px 22px rgba(225,29,72,0.28);
    }

    .neutral-btn {
      background: linear-gradient(180deg, #dbe2ea 0%, #c4ccd8 100%);
      color: #1f2937;
    }

    .missed-btn {
      background: linear-gradient(180deg, #f87171 0%, #ef4444 100%);
      color: #fff;
      box-shadow: 0 10px 20px rgba(239,68,68,0.22);
    }

    .selector-wrap {
      width: 100%;
      max-width: 320px;
      margin-top: 8px;
    }

    .selector {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 800;
      color: #172033;
      background: linear-gradient(180deg, #ffffff 0%, #edf2f7 100%);
      box-shadow: 0 10px 20px rgba(148,163,184,0.18);
      text-align: center;
      text-align-last: center;
      outline: none;
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .selector.red-theme {
      background: linear-gradient(180deg, #f87171 0%, #ef4444 100%);
      color: #fff;
    }

    .selector.orange-theme {
      background: linear-gradient(180deg, #fdba74 0%, #fb923c 100%);
      color: #fff;
    }

    .selector.yellow-theme {
      background: linear-gradient(180deg, #fde68a 0%, #facc15 100%);
      color: #3b2f00;
    }

    .selector.green-theme {
      background: linear-gradient(180deg, #86efac 0%, #22c55e 100%);
      color: #fff;
    }

    .selector.blue-theme {
      background: linear-gradient(180deg, #93c5fd 0%, #3b82f6 100%);
      color: #fff;
    }

    .selector.purple-theme {
      background: linear-gradient(180deg, #c4b5fd 0%, #8b5cf6 100%);
      color: #fff;
    }

    .selector.brown-theme {
      background: linear-gradient(180deg, #c08457 0%, #8b5e3c 100%);
      color: #fff;
    }

    .selector.pink-theme {
      background: linear-gradient(180deg, #f9a8d4 0%, #ec4899 100%);
      color: #fff;
    }

    .selector.gray-theme {
      background: linear-gradient(180deg, #d1d5db 0%, #9ca3af 100%);
      color: #111827;
    }

    .selector.choice-theme {
      background: linear-gradient(180deg, #fcd34d 0%, #f59e0b 100%);
      color: #2b1a00;
    }

    .word-wrap {
      width: 100%;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px 0 6px;
    }

    .rainbow-word {
      font-size: clamp(58px, 15vw, 88px);
      font-weight: 900;
      line-height: 1;
      max-width: 100%;
      margin: 0 auto;
      color: var(--text);
      letter-spacing: -0.8px;
    }

    .mode-label {
      margin-top: 4px;
      font-size: 16px;
      font-weight: 800;
      color: #b91c1c;
      min-height: 20px;
    }

    .app.hard-mode .mode-label {
      color: #9f1239;
    }

    .rainbow-stats-top {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      width: 100%;
      margin: 2px 0 0 0;
      font-size: 18px;
      font-weight: 900;
      color: #1f2937;
    }

    .rainbow-stats-top .missed-text {
      color: #dc2626;
    }

    .rainbow-stats-top .correct-text {
      color: #16a34a;
    }

    .rainbow-button-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      width: 100%;
      margin-top: 8px;
      margin-bottom: 6px;
    }

    .rainbow-small-btn {
      min-width: 132px;
      padding: 12px 16px;
      font-size: 16px;
      border-radius: 999px;
    }

    .rainbow-reset-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 0;
    }

    .rainbow-reset-btn {
      min-width: 132px;
      padding: 12px 16px;
      font-size: 16px;
      border-radius: 999px;
    }

    .result-title {
      font-size: clamp(30px, 8vw, 50px);
      font-weight: 900;
      margin-bottom: 8px;
      line-height: 1.04;
      color: var(--text);
    }

    .result-text {
      font-size: 17px;
      line-height: 1.32;
      max-width: 310px;
      margin: 0 auto 10px auto;
      color: #243047;
    }

    .celebration-img {
      width: min(46vw, 170px);
      max-height: 170px;
      object-fit: cover;
      height: auto;
      border-radius: 22px;
      margin-top: 2px;
      box-shadow: 0 12px 28px rgba(0,0,0,.16);
      background: transparent;
      padding: 0;
      border: 0;
      display: block;
    }

    .compact-buttons {
      margin-top: 12px;
    }

    @media (max-width: 390px) {
      .brand-logo {
        width: min(46vw, 130px);
        max-width: 130px;
        max-height: 130px;
      }

      .result-text {
        font-size: 16px;
      }

      .celebration-img {
        width: min(50vw, 160px);
        max-height: 160px;
      }

      .rainbow-word {
        font-size: clamp(52px, 14vw, 74px);
      }

      .rainbow-stats-top {
        font-size: 17px;
        gap: 12px;
      }

      .rainbow-button-row {
        gap: 10px;
      }

      .rainbow-small-btn,
      .rainbow-reset-btn {
        min-width: 118px;
        font-size: 15px;
        padding: 11px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar"></div>

    <div class="screen active" id="rainbowHomeScreen">
      <img src="rainbow_reader_logo.png" alt="Rainbow Reader logo" class="brand-logo">
      <div class="title">Rainbow Reader</div>
      <div class="subtitle">Choose a color list</div>

      <div class="selector-wrap">
        <select class="selector" id="rainbowListSelect">
          <option value="Red">Red</option>
          <option value="Orange">Orange</option>
          <option value="Yellow">Yellow</option>
          <option value="Green">Green</option>
          <option value="Blue">Blue</option>
          <option value="Purple">Purple</option>
          <option value="Brown">Brown</option>
          <option value="Pink">Pink</option>
          <option value="Gray">Gray</option>
          <option value="Your Choice">Your Choice</option>
        </select>
      </div>

      <div class="menu-buttons">
        <button class="primary-btn" id="rainbowPickBtn" type="button">Continue</button>
        <button class="neutral-btn" id="rainbowBackBtn" type="button">Home</button>
      </div>
    </div>

    <div class="screen" id="rainbowModeScreen">
      <img src="rainbow_reader_logo.png" alt="Rainbow Reader logo" class="brand-logo">
      <div class="title">Rainbow Reader</div>
      <div class="subtitle" id="rainbowModeTitle">Red List</div>
      <div class="small-note">
        Practice your words in order, or tap Shuffle for a mixed-up challenge.
      </div>
      <div class="menu-buttons">
        <button class="primary-btn" id="rainbowStartBtn" type="button">Start</button>
        <button class="shuffle-hard-btn" id="rainbowShuffleBtn" type="button">Shuffle</button>
        <button class="neutral-btn" id="rainbowModeBackBtn" type="button">Home</button>
      </div>
    </div>

    <div class="screen" id="rainbowGameScreen">
      <div class="word-wrap">
        <div class="rainbow-word" id="rainbowWordText"></div>
      </div>
      <div class="rainbow-stats-top">
        <span id="rainbowProgressTop">Red 0 of 20</span>
        <span class="missed-text" id="rainbowMissedCount">Missed: 0</span>
        <span class="correct-text" id="rainbowCorrectCount">Correct: 0</span>
      </div>
      <div class="mode-label" id="rainbowModeLabel"></div>
      <div class="rainbow-button-row">
        <button class="missed-btn rainbow-small-btn" id="rainbowMissedBtn" type="button">Missed</button>
        <button class="primary-btn rainbow-small-btn" id="rainbowCorrectBtn" type="button">Correct</button>
      </div>
      <div class="rainbow-reset-wrap">
        <button class="neutral-btn rainbow-reset-btn" id="rainbowResetBtn" type="button">Reset</button>
      </div>
    </div>

    <div class="screen" id="finishScreen">
      <div class="result-title" id="finishTitle">Great Job, Reader!</div>
      <div class="result-text" id="finishText">You finished your practice.</div>
      <img id="celebrationImg" class="celebration-img" src="giphy.gif" alt="Celebration image">
      <div class="buttons compact-buttons" id="finishButtons"></div>
    </div>
  </div>

  <audio id="celebrationSound" preload="auto">
    <source src="celebration_sound.mp3" type="audio/mpeg">
  </audio>

  <script>
    const rainbowLists = {
      Red: [
        "I","can","the","we","see","a","like","to","and","go","you","do","my","are","he","with","is","little","she","was"
      ],
      Orange: [
        "for","have","of","they","said","want","here","me","this","what","too","has","play","where","look","good","who","come","does","help"
      ],
      Yellow: [
        "school","down","out","very","be","pull","move","two","again","new","there","use","could","live","one","then","three","eat","under","all","call","day","her","want","around"
      ],
      Green: [
        "by","many","place","walk","away","now","some","today","why","way","grow","pretty","should","together","water","green","any","from","happy","once","upon","so","ago","boy","girl"
      ],
      Blue: [
        "how","old","people","after","buy","done","every","soon","work","animal","about","carry","eight","give","our","blue","into","or","small","other","find","food","more","over","because"
      ],
      Purple: [
        "start","warm","caught","flew","know","laugh","listen","were","found","hard","near","woman","would","write","four","large","none","only","put","round","another","climb","full","great","poor"
      ],
      Brown: [
        "through","began","guess","learn","right","sure","color","early","instead","nothing","oh","thought","above","build","fall","knew","money","toward","answer","brought","busy","door","eyes","enough","love"
      ],
      Pink: [
        "brother","father","mother","friend","picture","been","month","children","their","year","question","before","heard","push","your","tomorrow","favorite","few","gone","surprise","wonder","young","saw","eye","front"
      ],
      Gray: [
        "word","which","better","sister","write","number","year","thing","good","sound","think","right","move","page","world","city","light","head","few","along","close","both","begin","often","while"
      ],
      "Your Choice": [
        "follow","change","animal","might","paper","earth","sentence","different","America","between","country","always","ground","example","important","something","together","family","myself","children","walked","believe","beautiful","bridge","hundred"
      ]
    };

    const maxCelebrationNumber = 40;
    const celebrationImages = ["giphy.gif"];
    for (let i = 1; i <= maxCelebrationNumber; i++) {
      celebrationImages.push(`giphy-${i}.gif`);
    }

    const app = document.getElementById("app");
    const rainbowListSelect = document.getElementById("rainbowListSelect");
    const rainbowModeTitle = document.getElementById("rainbowModeTitle");
    const rainbowWordText = document.getElementById("rainbowWordText");
    const rainbowModeLabel = document.getElementById("rainbowModeLabel");
    const rainbowProgressTop = document.getElementById("rainbowProgressTop");
    const rainbowMissedCount = document.getElementById("rainbowMissedCount");
    const rainbowCorrectCount = document.getElementById("rainbowCorrectCount");
    const finishTitle = document.getElementById("finishTitle");
    const finishText = document.getElementById("finishText");
    const celebrationImg = document.getElementById("celebrationImg");
    const finishButtons = document.getElementById("finishButtons");
    const celebrationSound = document.getElementById("celebrationSound");

    const screens = {
      home: document.getElementById("rainbowHomeScreen"),
      mode: document.getElementById("rainbowModeScreen"),
      game: document.getElementById("rainbowGameScreen"),
      finish: document.getElementById("finishScreen")
    };

    const colorThemes = {
      Red: "red-theme",
      Orange: "orange-theme",
      Yellow: "yellow-theme",
      Green: "green-theme",
      Blue: "blue-theme",
      Purple: "purple-theme",
      Brown: "brown-theme",
      Pink: "pink-theme",
      Gray: "gray-theme",
      "Your Choice": "choice-theme"
    };

    let currentMode = "home";
    let rainbowCurrentColor = "Red";
    let rainbowDeck = [];
    let rainbowIndex = 0;
    let rainbowShuffled = false;
    let rainbowCorrectCountValue = 0;
    let rainbowMissedCountValue = 0;
    let rainbowPendingMissed = [];

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
      }
      return arr;
    }

    function getRandomCelebrationImage() {
      const randomIndex = Math.floor(Math.random() * celebrationImages.length);
      return celebrationImages[randomIndex];
    }

    function playCelebrationSound() {
      if (!celebrationSound) return;
      celebrationSound.currentTime = 0;
      celebrationSound.play().catch(() => {});
    }

    function stopCelebrationSound() {
      if (!celebrationSound) return;
      celebrationSound.pause();
      celebrationSound.currentTime = 0;
    }

    function setHardMode(isHard) {
      if (isHard) {
        app.classList.add("hard-mode");
      } else {
        app.classList.remove("hard-mode");
      }
    }

    function updateSelectorTheme() {
      rainbowListSelect.className = "selector";
      const themeClass = colorThemes[rainbowListSelect.value];
      if (themeClass) {
        rainbowListSelect.classList.add(themeClass);
      }
    }

    function showScreen(screenKey) {
      Object.values(screens).forEach(screen => screen.classList.remove("active"));
      screens[screenKey].classList.add("active");
      currentMode = screenKey;
      updateHeader();
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    function updateHeader() {
      if (currentMode === "home" || currentMode === "mode" || currentMode === "finish") {
        setHardMode(false);
      } else if (currentMode === "game") {
        setHardMode(rainbowShuffled);
      }
    }

    function setSelectedColor() {
      rainbowCurrentColor = rainbowListSelect.value;
      rainbowModeTitle.textContent = `${rainbowCurrentColor} List`;
      showScreen("mode");
    }

    function buildRainbowDeck(shuffleFirst = false) {
      rainbowDeck = [...rainbowLists[rainbowCurrentColor]];
      if (shuffleFirst) {
        rainbowDeck = shuffleArray(rainbowDeck);
      }
      rainbowIndex = 0;
      rainbowShuffled = shuffleFirst;
      rainbowCorrectCountValue = 0;
      rainbowMissedCountValue = 0;
      rainbowPendingMissed = [];
    }

    function updateRainbowStats() {
      const totalCount = rainbowLists[rainbowCurrentColor].length;
      rainbowProgressTop.textContent = `${rainbowCurrentColor} ${rainbowCorrectCountValue} of ${totalCount}`;
      rainbowMissedCount.textContent = `Missed: ${rainbowMissedCountValue}`;
      rainbowCorrectCount.textContent = `Correct: ${rainbowCorrectCountValue}`;
    }

    function updateRainbowModeLabel() {
      rainbowModeLabel.textContent = rainbowShuffled ? "Shuffle Mode" : "In Order";
    }

    function showRainbowWord() {
      rainbowWordText.textContent = rainbowDeck[rainbowIndex];
      updateRainbowStats();
      updateRainbowModeLabel();
      updateHeader();
    }

    function launchRainbowGame(shuffleFirst = false) {
      stopCelebrationSound();
      buildRainbowDeck(shuffleFirst);
      showScreen("game");
      showRainbowWord();
    }

    function setFinishButtons(buttons) {
      finishButtons.innerHTML = "";
      buttons.forEach(btn => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = btn.label;
        button.className = btn.className;
        button.addEventListener("click", btn.onClick);
        finishButtons.appendChild(button);
      });
    }

    function goToNextRainbowWord() {
      rainbowIndex++;

      if (rainbowIndex >= rainbowDeck.length) {
        if (rainbowPendingMissed.length > 0) {
          const retryWords = [...rainbowPendingMissed];
          rainbowPendingMissed = [];
          rainbowDeck = rainbowShuffled ? shuffleArray(retryWords) : retryWords;
          rainbowIndex = 0;
        } else {
          finishTitle.textContent = `${rainbowCurrentColor} Complete!`;
          finishText.textContent = `Correct: ${rainbowCorrectCountValue}. Missed: ${rainbowMissedCountValue}. Great reading!`;
          celebrationImg.src = getRandomCelebrationImage();
          setFinishButtons([
            { label: "Read Again", className: "primary-btn", onClick: () => showScreen("mode") },
            { label: "Choose Another List", className: "secondary-btn", onClick: () => showScreen("home") },
            { label: "Home", className: "neutral-btn", onClick: () => window.location.href = "index.html" }
          ]);
          playCelebrationSound();
          showScreen("finish");
          return;
        }
      }

      showRainbowWord();
    }

    function markRainbowCorrect() {
      rainbowCorrectCountValue++;
      goToNextRainbowWord();
    }

    function markRainbowMissed() {
      const currentWord = rainbowDeck[rainbowIndex];
      rainbowMissedCountValue++;
      rainbowPendingMissed.push(currentWord);
      goToNextRainbowWord();
    }

    function resetRainbowGame() {
      stopCelebrationSound();
      rainbowDeck = [];
      rainbowIndex = 0;
      rainbowShuffled = false;
      rainbowCorrectCountValue = 0;
      rainbowMissedCountValue = 0;
      rainbowPendingMissed = [];
      setHardMode(false);
      showScreen("mode");
    }

    document.getElementById("rainbowPickBtn").addEventListener("click", setSelectedColor);
    document.getElementById("rainbowBackBtn").addEventListener("click", () => window.location.href = "index.html");
    document.getElementById("rainbowModeBackBtn").addEventListener("click", () => window.location.href = "index.html");
    document.getElementById("rainbowStartBtn").addEventListener("click", () => launchRainbowGame(false));
    document.getElementById("rainbowShuffleBtn").addEventListener("click", () => launchRainbowGame(true));
    document.getElementById("rainbowCorrectBtn").addEventListener("click", markRainbowCorrect);
    document.getElementById("rainbowMissedBtn").addEventListener("click", markRainbowMissed);
    document.getElementById("rainbowResetBtn").addEventListener("click", resetRainbowGame);
    rainbowListSelect.addEventListener("change", updateSelectorTheme);

    celebrationImg.src = getRandomCelebrationImage();
    updateSelectorTheme();
    updateHeader();
  </script>
</body>
</html>
